model = "gpt-5.5"
model_reasoning_effort = "medium"

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "model",
  "project-name",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "used-tokens",
  "total-input-tokens",
  "total-output-tokens",
]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[mcp_servers.stitch]
url = "https://stitch.googleapis.com/mcp"

[mcp_servers.stitch.http_headers]
# Replace with your actual Google API key for Stitch MCP
"X-Goog-Api-Key" = "REPLACE_ME"

[marketplaces.claude-code-skills]
source_type = "git"
source = "https://github.com/alirezarezvani/claude-skills.git"

[marketplaces.claude-community]
source_type = "git"
source = "https://github.com/anthropics/claude-plugins-community.git"

[marketplaces.claude-plugins-official]
source_type = "git"
source = "https://github.com/anthropics/claude-plugins-official.git"

[marketplaces.cabrera-evil-skills]
source_type = "git"
source = "git@github.com:cabrera-evil/skills.git"

[plugins."engineering-skills@claude-code-skills"]
enabled = true

[plugins."engineering-advanced-skills@claude-code-skills"]
enabled = true

[plugins."dbx@cabrera-evil-skills"]
enabled = true

[plugins."cabrera-evil@cabrera-evil-skills"]
enabled = true
